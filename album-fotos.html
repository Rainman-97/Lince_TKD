<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum de Fotos | Lynx Hoga Ki</title>
  <meta name="description" content="Álbum de fotos de Lynx Hoga Ki con momentos de entrenamiento, eventos y comunidad marcial.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --ink: #101522;
      --ink-soft: #2c3242;
      --red: #d91f16;
      --line: rgba(16, 21, 34, 0.12);
      --shadow: 0 20px 50px rgba(16, 21, 34, 0.14);
      --radius: 28px;
      --content: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(217, 31, 22, 0.1), transparent 28%),
        linear-gradient(180deg, #fcfbf8 0%, #f2efea 100%);
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      width: min(calc(100% - 2rem), var(--content));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1.25rem 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .brand img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(16, 21, 34, 0.08);
      background: #fff;
    }

    .eyebrow {
      margin: 0 0 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.74rem;
      font-weight: 800;
      color: var(--red);
    }

    h1,
    h2 {
      margin: 0;
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.04em;
    }

    .brand h1 {
      font-size: 2rem;
      line-height: 1;
    }

    .corner-menu {
      position: relative;
    }

    .corner-menu-toggle {
      width: 62px;
      height: 62px;
      padding: 0.2rem;
      border: 2px solid rgba(16, 21, 34, 0.12);
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 14px 28px rgba(16, 21, 34, 0.14);
      cursor: pointer;
    }

    .corner-menu-toggle img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    .corner-menu-panel {
      position: absolute;
      top: calc(100% + 0.8rem);
      right: 0;
      min-width: 220px;
      padding: 0.8rem;
      display: none;
      flex-direction: column;
      gap: 0.35rem;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(16, 21, 34, 0.08);
      border-radius: 22px;
      box-shadow: 0 24px 40px rgba(16, 21, 34, 0.18);
      z-index: 20;
    }

    .corner-menu-panel.open {
      display: flex;
    }

    .corner-menu-panel a {
      padding: 0.8rem 0.9rem;
      border-radius: 14px;
      font-weight: 700;
      color: var(--ink);
      transition: background 180ms ease, color 180ms ease;
    }

    .corner-menu-panel a:hover,
    .corner-menu-panel a:focus-visible {
      background: rgba(217, 31, 22, 0.08);
      color: #b9150d;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 0.95fr;
      gap: 2rem;
      align-items: center;
      padding: 2rem 0 3rem;
    }

    .hero h2 {
      font-size: clamp(3rem, 7vw, 5.2rem);
      line-height: 0.95;
      max-width: 9ch;
    }

    .hero p {
      color: var(--ink-soft);
      line-height: 1.8;
      font-size: 1.04rem;
    }

    .hero-card {
      background: linear-gradient(180deg, rgba(16, 21, 34, 0.98), rgba(27, 33, 47, 0.98));
      color: #fff;
      border-radius: 34px;
      padding: 1rem;
      box-shadow: var(--shadow);
      border: 2px solid rgba(255, 255, 255, 0.08);
    }

    .hero-card img {
      width: 100%;
      border-radius: 24px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .gallery-section {
      padding: 1rem 0 4rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.4rem;
    }

    .photo-card {
      margin: 0;
      padding: 0.7rem;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(16, 21, 34, 0.98), rgba(28, 34, 47, 0.98));
      box-shadow: var(--shadow);
      border: 2px solid rgba(255, 255, 255, 0.08);
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      min-height: 280px;
      border-radius: 18px;
      object-fit: cover;
      background: #fff;
      cursor: pointer;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: rgba(5, 7, 13, 0.92);
      z-index: 1000;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: min(92vw, 1200px);
      max-height: 88vh;
      border-radius: 24px;
      border: 4px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
      background: #111;
    }

    .lightbox-control {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 1.8rem;
      font-weight: 800;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .lightbox-control:hover,
    .lightbox-control:focus-visible {
      background: rgba(217, 31, 22, 0.88);
    }

    .lightbox-close {
      top: 1.2rem;
      right: 1.2rem;
    }

    .lightbox-prev {
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-next {
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .footer {
      padding: 0 0 2rem;
      color: var(--ink-soft);
      font-weight: 600;
    }

    @media (max-width: 980px) {
      .hero,
      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .hero h2 {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">
        <img src="Lynx.jpg" alt="Logo de Lynx Hoga Ki">
        <div>
          <p class="eyebrow">Lynx Hoga Ki</p>
          <h1>Club Deportivo Lynx Hoga Ki</h1>
        </div>
      </div>
      <div class="corner-menu">
        <button class="corner-menu-toggle" type="button" aria-expanded="false" aria-controls="corner-menu-panel" aria-label="Abrir menú">
          <img src="Lynx.jpg" alt="Logo de Lynx Hoga Ki">
        </button>
        <div id="corner-menu-panel" class="corner-menu-panel">
          <a href="index.html">Inicio</a>
          <a href="album-fotos.html">Álbum de fotos</a>
          <a href="eventos.html">Eventos</a>
          <a href="cronograma.html">Cronograma</a>
          <a href="profesores.html">Equipo formativo</a>
        </div>
      </div>
    </header>

    <section class="hero">
      <div>
        <p class="eyebrow">Galería</p>
        <h2>Club Deportivo Lynx Hoga Ki</h2>
        <p>
          Esta galería reúne parte del club <strong>Lynx Hoga Ki</strong>:
          entrenamientos, equipo, competencias y crecimiento marcial.
        </p>
      </div>
      <div class="hero-card">
        <img src="foto.jpg" alt="Grupo de estudiantes de Lynx Hoga Ki en uniforme negro">
      </div>
    </section>

    <section class="gallery-section">
      <div class="gallery-grid">
        <figure class="photo-card">
          <img src="foto1.jpg" alt="Grupo de estudiantes y niños de Lynx Hoga Ki en entrenamiento" data-gallery-image>
        </figure>
        <figure class="photo-card">
          <img src="foto2.jpg" alt="Equipo de Lynx Hoga Ki con medallas y trofeo" data-gallery-image>
        </figure>
        <figure class="photo-card">
          <img src="foto3.jpg" alt="Estudiantes y familias reunidos en evento de la academia" data-gallery-image>
        </figure>
        <figure class="photo-card">
          <img src="foto4.jpg" alt="Practicantes con petos de entrenamiento" data-gallery-image>
        </figure>
        <figure class="photo-card">
          <img src="foto5.jpg" alt="Maestros y practicantes en el tatami" data-gallery-image>
        </figure>
        <figure class="photo-card">
          <img src="foto6.jpg" alt="Grupo de alumnos de Lynx Hoga Ki en uniforme negro" data-gallery-image>
        </figure>
        <figure class="photo-card">
          <img src="foto7.jpg" alt="Practicantes de Lynx Hoga Ki en uniforme azul y blanco" data-gallery-image>
        </figure>
      </div>
    </section>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox-control lightbox-close" type="button" aria-label="Cerrar visor">×</button>
      <button class="lightbox-control lightbox-prev" type="button" aria-label="Imagen anterior">‹</button>
      <img id="lightbox-image" src="" alt="">
      <button class="lightbox-control lightbox-next" type="button" aria-label="Imagen siguiente">›</button>
    </div>

    <footer class="footer">
      <p>Lynx Hoga Ki | Bogotá, D.C. - Colombia</p>
    </footer>
  </div>
  <script>
    const menuButton = document.querySelector(".corner-menu-toggle");
    const menuPanel = document.querySelector(".corner-menu-panel");
    const galleryImages = Array.from(document.querySelectorAll("[data-gallery-image]"));
    const lightbox = document.querySelector("#lightbox");
    const lightboxImage = document.querySelector("#lightbox-image");
    const closeButton = document.querySelector(".lightbox-close");
    const prevButton = document.querySelector(".lightbox-prev");
    const nextButton = document.querySelector(".lightbox-next");
    let currentIndex = 0;

    if (menuButton && menuPanel) {
      menuButton.addEventListener("click", () => {
        const isOpen = menuPanel.classList.toggle("open");
        menuButton.setAttribute("aria-expanded", String(isOpen));
      });

      document.addEventListener("click", (event) => {
        const clickedInsideMenu = menuPanel.contains(event.target) || menuButton.contains(event.target);
        if (!clickedInsideMenu) {
          menuPanel.classList.remove("open");
          menuButton.setAttribute("aria-expanded", "false");
        }
      });
    }

    function updateLightbox(index) {
      const image = galleryImages[index];
      if (!image) return;
      currentIndex = index;
      lightboxImage.src = image.src;
      lightboxImage.alt = image.alt;
    }

    function openLightbox(index) {
      updateLightbox(index);
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
    }

    function showNext() {
      updateLightbox((currentIndex + 1) % galleryImages.length);
    }

    function showPrev() {
      updateLightbox((currentIndex - 1 + galleryImages.length) % galleryImages.length);
    }

    galleryImages.forEach((image, index) => {
      image.addEventListener("click", () => openLightbox(index));
    });

    closeButton.addEventListener("click", closeLightbox);
    nextButton.addEventListener("click", showNext);
    prevButton.addEventListener("click", showPrev);

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", (event) => {
      if (!lightbox.classList.contains("open")) return;
      if (event.key === "Escape") closeLightbox();
      if (event.key === "ArrowRight") showNext();
      if (event.key === "ArrowLeft") showPrev();
    });
  </script>
</body>
</html>
